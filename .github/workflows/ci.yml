name: CI Advanced

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build step
        run: |
          echo "Building static site..."
          test -d public && echo "public directory exists"
          echo "Build completed at: $(date)"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate website files
        run: |
          echo "Running validation checks..."
          test -f public/index.html && echo "index.html exists" || exit 1
          test -f public/styles.css && echo "styles.css exists" || exit 1
          test -f public/js/main.js && echo "main.js exists" || exit 1
          grep -q "<title>" public/index.html && echo "title tag found" || (echo "Missing title tag" && exit 1)
          grep -q "CI/CD" public/index.html && echo "CI/CD content found" || (echo "Missing CI/CD content" && exit 1)
          echo "All checks passed at: $(date)"

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4